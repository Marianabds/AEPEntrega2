        function toast(msg) {
            let t = document.querySelector('.toast');
            if (t) t.remove();
            t = document.createElement('div');
            t.className = 'toast';
            t.innerText = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2500);
        }

        function renderizar() {
            const root = document.getElementById('root');
            if (!usuarioLogado) {
                root.innerHTML = telaLoginSplit();
                document.querySelectorAll('[data-acao]').forEach(el => {
                    el.addEventListener('click', (e) => {
                        const acao = el.dataset.acao;
                        if (acao === 'mudarAuth') { abaAuth = el.dataset.tab; renderizar(); }
                        else if (acao === 'login') fazerLogin();
                        else if (acao === 'cadastro') fazerCadastro();
                        else if (acao === 'demo') entrarDemo();
                    });
                });
            } else {
                root.innerHTML = telaApp();
                anexarEventosApp();
            }

        function fazerLogin() {
            const email = document.getElementById('loginEmail').value;
            const senha = document.getElementById('loginSenha').value;
            const user = usuarios.find(u => u.email === email && u.senha === senha);
            if (user) { usuarioLogado = user; renderizar(); }
            else document.getElementById('erroAuth').innerText = 'E-mail ou senha inválidos';

        function fazerCadastro() {
            const nome = document.getElementById('cadNome').value.trim();
            const email = document.getElementById('cadEmail').value.trim();
            const senha = document.getElementById('cadSenha').value;
            const tipo = document.getElementById('cadTipo').value;
            const cidade = document.getElementById('cadCidade').value.trim();
            if (!nome || !email || senha.length < 4 || !cidade) {
                document.getElementById('erroAuth').innerText = 'Preencha todos os campos';
                return;
            }
            if (usuarios.find(u => u.email === email)) {
                document.getElementById('erroAuth').innerText = 'E-mail já cadastrado';
                return;
            }
            const novo = { id: idUnico(), nome, email, senha, tipo, cidade, data: Date.now() };
            usuarios.push(novo); salvar(); usuarioLogado = novo; renderizar();

            let demo = usuarios.find(u => u.email === 'demo@visitante.com');

            let lista = itens.filter(i => i.estado === 'disponivel' && i.doadorId !== usuarioLogado.id);

        function atividadeHtml() {
            const minhasDoacoes = itens.filter(i => i.doadorId === usuarioLogado.id);
            const meusPedidos = solicitacoes.filter(s => s.solicitanteId === usuarioLogado.id);

            const prioridadeTag = (p) => `<span class="tagp p-${p}">Prioridade ${p}</span>`;

            let doacoesHtml = '';
            if (minhasDoacoes.length === 0) {
                doacoesHtml = '<div class="vazio">Nenhuma doação publicada ainda</div>';
            } else {
                doacoesHtml = `<div class="grid">` + minhasDoacoes.map(item => {
                    const solicitacoesDoItem = solicitacoes.filter(s => s.itemId === item.id);
                    const rows = solicitacoesDoItem.map(sol => `
                    <div class="req-row">
                        <div class="avatar" style="width:32px;height:32px;font-size:12px;background:#e0e0e0;color:#2b5e3b">${sol.solicitanteNome.charAt(0)}</div>
                        <div style="flex:1">
                            <div><b>${sol.solicitanteNome}</b> ${sol.status === 'pendente' ? '<span class="badge b-pend">Pendente</span>' : (sol.status === 'aceito' ? '<span class="badge b-aceito">Aceito</span>' : '<span class="badge b-recusado">Recusado</span>')}</div>

                        </div>
                        ${sol.status === 'pendente' ? `
                            <button class="btn-sm" data-acao="responder" data-id="${sol.id}" data-decisao="aceito">Aceitar</button>
                            <button class="btn-sm danger-t" data-acao="responder" data-id="${sol.id}" data-decisao="recusado">Recusar</button>
                        ` : `
                            <button class="btn-sm btn-outline" data-acao="abrirChat" data-cid="${sol.id}">Conversar</button>
                        `}
                    </div>
                `).join('');
                    return `<div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <div class="cat-tag">${item.categoria}</div>
                        ${estadoBadge(item.estado)}
                    </div>
                    <h3 style="margin:12px 0 5px">${item.titulo}</h3>
                    <div class="prio">${prioridadeTag(item.prioridade)}</div>
                    <div class="meta"> ${item.cidade} · ${solicitacoesDoItem.length} interesse(s)</div>
                    ${rows || '<p>Nenhum interesse ainda.</p>'}
                    ${item.estado === 'reservado' ? `<button class="btn-sm" data-acao="concluir" data-id="${item.id}" style="margin-top:13px">Marcar como doado</button>` : ''}
                    <button class="btn-cancelar" data-acao="excluirDoacao" data-id="${item.id}">Cancelar</button>

                pedidosHtml = `<div class="grid">` + meusPedidos.map(sol => {
                    const item = itens.find(i => i.id === sol.itemId);
                    if (!item) return '';
                    return `<div class="card">
                    <div class="cat-tag">${item.categoria}</div>
                    <h3>${item.titulo}</h3>
                    <div class="meta">Doador: ${item.doadorNome} · Status: ${sol.status}</div>

                </div>`;

            return `<h2 style="margin-bottom:14px">Minhas doações</h2>${doacoesHtml}<h2 style="margin:32px 0 14px">Meus pedidos</h2>${pedidosHtml}`;
        }

        function mensagensHtml() {
            let conversas = solicitacoes.filter(s => s.doadorId === usuarioLogado.id || s.solicitanteId === usuarioLogado.id);
            if (conversas.length === 0) return '<div class="vazio">Nenhuma conversa iniciada</div>';
            if (!chatAberto && conversas.length) chatAberto = conversas[0].id;
            const msgs = mensagens.filter(m => m.solicitacaoId === chatAberto).sort((a, b) => a.data - b.data);
            const solAtual = solicitacoes.find(s => s.id === chatAberto);
            const outroNome = solAtual ? (solAtual.doadorId === usuarioLogado.id ? solAtual.solicitanteNome : solAtual.doadorNome) : '';
            return `<div class="chat-area">
            <div class="lista-conv">
                ${conversas.map(conv => {
                const outro = conv.doadorId === usuarioLogado.id ? conv.solicitanteNome : conv.doadorNome;
                return `<div data-acao="abrirChat" data-cid="${conv.id}" class="conv-item ${chatAberto === conv.id ? 'ativo' : ''}">
                        <b>${outro}</b><br><small>${conv.itemTitulo}</small>
                    </div>`;
            }).join('')}
            </div>
            <div class="chat-painel">
                <div style="padding:14px; border-bottom:1px solid #e2dccd"><b>${outroNome}</b> · ${solAtual?.itemTitulo}</div>
                <div class="mensagens" id="msgArea">
                    ${msgs.map(m => `<div class="bubble ${m.remetenteId === usuarioLogado.id ? 'me' : 'eles'}">${m.texto}<div style="font-size:10px">${new Date(m.data).toLocaleTimeString()}</div></div>`).join('')}

                <div class="input-chat">
                    <input id="chatInput" placeholder="Digite sua mensagem...">
                    <button data-acao="enviarMsg">Enviar</button>

        function perfilHtml() {
            const publi = itens.filter(i => i.doadorId === usuarioLogado.id).length;
            const doadas = itens.filter(i => i.doadorId === usuarioLogado.id && i.estado === 'doado').length;
            const ped = solicitacoes.filter(s => s.solicitanteId === usuarioLogado.id).length;
            const ini = usuarioLogado.nome.charAt(0).toUpperCase();
            return `<div class="card perfil-card">
            <div class="perfil-topo"><div class="avatar">${ini}</div><h2>${usuarioLogado.nome}</h2><p>${usuarioLogado.tipo}</p></div>
            <div class="perfil-info"><div><strong>E-mail</strong><br>${usuarioLogado.email}</div><div><strong>Cidade</strong><br>${usuarioLogado.cidade}</div></div>
            <div class="perfil-stats"><div class="stat"><b>${publi}</b><br>Publicados</div><div class="stat"><b>${doadas}</b><br>Concluídos</div><div class="stat"><b>${ped}</b><br>Pedidos</div></div>
            <div class="perfil-acoes"><button data-acao="logout" class="secundario">Sair da conta</button></div>
        </div>`;
        }

        function anexarEventosApp() {
            document.body.addEventListener('click', function (e) {
                const el = e.target.closest('[data-acao]');
                if (!el) return;
                const acao = el.dataset.acao;

                if (acao === 'aba') {
                    abaAtual = el.dataset.val;
                    chatAberto = null;
                    renderizar();
                }
                else if (acao === 'logout') {
                    usuarioLogado = null;
                    chatAberto = null;
                    renderizar();
                }
                else if (acao === 'abrirModalDoar') abrirModalDoar();
                else if (acao === 'fecharModal') fecharModal();
                else if (acao === 'publicarItem') publicarItem();
                else if (acao === 'verItem') verItem(el.dataset.id);
                else if (acao === 'solicitarItem') solicitarItem(el.dataset.id);
                else if (acao === 'responder') responderSolicitacao(el.dataset.id, el.dataset.decisao);
                else if (acao === 'concluir') marcarConcluido(el.dataset.id);
                else if (acao === 'excluirDoacao') excluirDoacao(el.dataset.id);
                else if (acao === 'abrirChat') {
                    chatAberto = el.dataset.cid;
                    abaAtual = 'mensagens';
                    renderizar();
                    setTimeout(() => { const a = document.getElementById('msgArea'); if (a) a.scrollTop = a.scrollHeight; }, 50);
                }
                else if (acao === 'enviarMsg') enviarMensagem();
                else if (acao === 'filtroCat') {
                    filtroCat = el.dataset.cat;
                    renderizar();
                }
            });

            const buscaInput = document.getElementById('campoBusca');
            if (buscaInput) buscaInput.addEventListener('input', e => { busca = e.target.value; renderizar(); });

            const chatInput = document.getElementById('chatInput');
            if (chatInput) chatInput.addEventListener('keypress', e => { if (e.key === 'Enter') enviarMensagem(); });
        }

        function excluirDoacao(itemId) {
            const item = itens.find(i => i.id === itemId);
            if (!item) return;
            if (confirm(`Tem certeza que deseja excluir a doação "${item.titulo}"? Esta ação não pode ser desfeita.`)) {
                const solicitacoesRelacionadas = solicitacoes.filter(s => s.itemId === itemId);
                solicitacoesRelacionadas.forEach(sol => {
                    const msgsToRemove = mensagens.filter(m => m.solicitacaoId === sol.id);
                    msgsToRemove.forEach(m => {
                        const idx = mensagens.findIndex(msg => msg.id === m.id);
                        if (idx !== -1) mensagens.splice(idx, 1);
                    });
                    const idxSol = solicitacoes.findIndex(s => s.id === sol.id);
                    if (idxSol !== -1) solicitacoes.splice(idxSol, 1);
                });
                const idxItem = itens.findIndex(i => i.id === itemId);
                if (idxItem !== -1) itens.splice(idxItem, 1);
                salvar();
                renderizar();
                toast(`Doação "${item.titulo}" excluída.`);
            }
        }

        function abrirModalDoar() {
            fecharModal();
            const html = `<div class="modal" id="modalDoar"><div class="modal-conteudo">
            <h3>Doar item com IA Groq (sugestão em tempo real)</h3>
            <input id="dTitulo" placeholder="Título do item">
            <textarea id="dDesc" rows="3" placeholder="Descrição"></textarea>
            <select id="dCategoria">
                <option>Alimentos</option><option>Roupas</option><option>Higiene</option><option>Material escolar</option>
                <option>Móveis</option><option>Eletrônicos</option><option>Brinquedos</option><option>Outros</option>
            </select>
            <select id="dCondicao"><option>Novo</option><option>Seminovo</option><option>Usado - bom</option><option>Usado - regular</option></select>
            <input id="dCidade" value="${usuarioLogado.cidade}">
            <div id="iaSugestao" style="background:#edf2e7;padding:10px;border-radius:16px;margin:12px 0;font-size:13px">✦ A categoria será atualizada automaticamente conforme você digita.</div>
            <div class="erro" id="erroPub"></div>
            <button data-acao="publicarItem">Publicar doação</button>
            <button data-acao="fecharModal" class="secundario">Cancelar</button>
        </div></div>`;
            document.body.insertAdjacentHTML('beforeend', html);
            const descArea = document.getElementById('dDesc');
            const catSelect = document.getElementById('dCategoria');
            const iaDiv = document.getElementById('iaSugestao');
            const updateSuggestion = async () => {
                const texto = descArea.value;
                if (!texto || texto.length < 3) {
                    iaDiv.innerHTML = '✦ Digite a descrição para receber sugestão de categoria.';
                    return;
                }
                iaDiv.innerHTML = '✦ IA analisando...';
                const categoriaSugerida = await sugerirCategoriaGroq(texto);
                if (categoriaSugerida) {
                    catSelect.value = categoriaSugerida;
                    iaDiv.innerHTML = `✦ Categoria sugerida: <b>${categoriaSugerida}</b> (baseado na descrição)`;
                } else {
                    iaDiv.innerHTML = '✦ Não foi possível obter sugestão. Selecione manualmente.';
                }
            };
            descArea.addEventListener('input', () => {
                clearTimeout(timeoutSugestao);
                timeoutSugestao = setTimeout(updateSuggestion, 800);
            });
        }

        async function publicarItem() {
            const titulo = document.getElementById('dTitulo').value.trim();
            const desc = document.getElementById('dDesc').value.trim();
            const cidade = document.getElementById('dCidade').value.trim();
            const condicao = document.getElementById('dCondicao').value;
            const categoria = document.getElementById('dCategoria').value;
            if (!titulo || !desc) {
                document.getElementById('erroPub').innerText = 'Preencha título e descrição';
                return;
            }
            const btn = document.querySelector('[data-acao="publicarItem"]');
            const originalText = btn.innerText;
            btn.innerText = '✦ IA Groq processando...';
            btn.disabled = true;
            try {
                const textoCompleto = titulo + " " + desc;
                let prioridade;
                if (iaDisponivel) {
                    prioridade = await prioridadeComGroq(categoria, textoCompleto);
                } else {
                    prioridade = fallbackPrioridade(categoria, textoCompleto);
                }
                const novoItem = {
                    id: idUnico(), doadorId: usuarioLogado.id, doadorNome: usuarioLogado.nome,
                    titulo, descricao: desc, categoria, condicao, cidade,
                    estado: 'disponivel', data: Date.now(), prioridade
                };
                itens.push(novoItem); salvar(); fecharModal(); renderizar();
                toast(`Item publicado! Categoria: ${categoria} | Prioridade: ${prioridade}`);
            } catch (e) {
                document.getElementById('erroPub').innerText = 'Erro ao processar. Tente novamente.';
                console.error(e);
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        function verItem(id) {
            const item = itens.find(i => i.id === id);
            if (!item) {
                toast("Item não encontrado");
                return;
            }

            // Remove qualquer modal aberto antes (evita duplicação)
            fecharModal();

            const jaSolicitou = solicitacoes.some(s => s.itemId === id && s.solicitanteId === usuarioLogado.id);
            const isDisponivel = item.estado === 'disponivel';
            const podeSolicitar = isDisponivel && !jaSolicitou && usuarioLogado.id !== item.doadorId && (usuarioLogado.tipo === 'beneficiario' || usuarioLogado.tipo === 'ambos');

            const modalHtml = `
                <div class="modal" id="modalItem">
                    <div class="modal-conteudo">
                        <div>
                            <span class="tag">${item.categoria}</span>
                            <span class="tag">${item.condicao}</span>
                            <span class="tag ${item.prioridade === 'alta' ? 'tag-alta' : (item.prioridade === 'media' ? 'tag-media' : 'tag-baixa')}">
                                Prioridade ${item.prioridade}
                            </span>
                        </div>
                        <h3 style="margin: 16px 0 8px">${item.titulo}</h3>
                        <p style="margin-bottom: 12px">${item.descricao}</p>
                        <div style="margin-bottom: 8px"><strong>Doador:</strong> ${item.doadorNome}</div>
                        <div style="margin-bottom: 16px"><strong>Cidade:</strong> ${item.cidade}</div>
                        ${!isDisponivel ? '<p style="color:#bc4e2c">Este item não está mais disponível.</p>' : ''}
                        ${isDisponivel && jaSolicitou ? '<p>Você já solicitou este item. Aguarde a resposta do doador.</p>' : ''}
                        ${podeSolicitar ? `
                            <textarea id="msgSolic" rows="3" placeholder="Escreva uma mensagem para o doador (ex: tenho interesse, posso retirar...)" style="width:100%; margin-top: 10px"></textarea>
                            <button data-acao="solicitarItem" data-id="${item.id}" style="margin-top: 12px; width:100%">Demonstrar interesse</button>
                        ` : ''}
                        <button data-acao="fecharModal" class="secundario" style="margin-top: 20px; width:100%">Fechar</button>
                    </div>
                </div>
            `;

            document.body.insertAdjacentHTML('beforeend', modalHtml);

            // Fechar ao clicar fora do conteúdo (no fundo escuro)
            const modalDiv = document.getElementById('modalItem');
            modalDiv.addEventListener('click', (e) => {
                if (e.target === modalDiv) fecharModal();
            });
        }

        function solicitarItem(itemId) {
            const item = itens.find(i => i.id === itemId);
            if (!item || item.estado !== 'disponivel') {
                toast("Item não disponível para solicitação");
                fecharModal();
                return;
            }
            const jaSolicitou = solicitacoes.some(s => s.itemId === itemId && s.solicitanteId === usuarioLogado.id);
            if (jaSolicitou) {
                toast("Você já demonstrou interesse neste item.");
                fecharModal();
                return;
            }

            const msg = document.getElementById('msgSolic')?.value.trim();
            const mensagemFinal = msg || `Olá, tenho interesse em "${item.titulo}". Podemos conversar?`;

            const novaSol = {
                id: idUnico(),
                itemId,
                itemTitulo: item.titulo,
                doadorId: item.doadorId,
                doadorNome: item.doadorNome,
                solicitanteId: usuarioLogado.id,
                solicitanteNome: usuarioLogado.nome,
                mensagem: mensagemFinal,
                status: 'pendente',
                data: Date.now()
            };
            solicitacoes.push(novaSol);

            mensagens.push({
                id: idUnico(),
                solicitacaoId: novaSol.id,
                remetenteId: usuarioLogado.id,
                texto: mensagemFinal,
                data: Date.now()
            });

            salvar();
            fecharModal();
            renderizar();
            toast("Interesse enviado! O doador será notificado.");
        }

        function responderSolicitacao(solId, decisao) {
            const sol = solicitacoes.find(s => s.id === solId);
            if (sol) {
                sol.status = decisao;
                if (decisao === 'aceito') {
                    const item = itens.find(i => i.id === sol.itemId);
                    if (item && item.estado === 'disponivel') item.estado = 'reservado';
                }
                const textoMsg = decisao === 'aceito' ? 'Pedido aceito! O item foi reservado para você.' : 'Pedido recusado pelo doador.';
                mensagens.push({ id: idUnico(), solicitacaoId: solId, remetenteId: 'sistema', texto: textoMsg, data: Date.now() });
                salvar(); renderizar(); toast(decisao === 'aceito' ? 'Pedido aceito!' : 'Pedido recusado');
            }
        }

        function marcarConcluido(itemId) {
            const item = itens.find(i => i.id === itemId);
            if (item && item.estado === 'reservado') {
                item.estado = 'doado'; salvar(); renderizar(); toast('Doação concluída!');
            }
        }

        function enviarMensagem() {
            const input = document.getElementById('chatInput');
            if (!input || !input.value.trim()) return;
            const texto = input.value;
            const sol = solicitacoes.find(s => s.id === chatAberto);
            if (sol) {
                mensagens.push({ id: idUnico(), solicitacaoId: chatAberto, remetenteId: usuarioLogado.id, texto, data: Date.now() });
                salvar(); input.value = ''; renderizar();
                setTimeout(() => { const a = document.getElementById('msgArea'); if (a) a.scrollTop = a.scrollHeight; }, 30);
            }
        }

        function fecharModal() {
            const m = document.querySelector('.modal');
            if (m) m.remove();
        }

        async function start() {
            await testarConexaoGroq();
            carregar();
            renderizar();
        }
        start();
    </script>
</body>

</html>
